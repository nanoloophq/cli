name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            npm_pkg: cli-darwin-arm64
            npm_os: darwin
            npm_cpu: arm64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            npm_pkg: cli-darwin-x64
            npm_os: darwin
            npm_cpu: x64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            npm_pkg: cli-linux-x64
            npm_os: linux
            npm_cpu: x64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            npm_pkg: cli-linux-arm64
            npm_os: linux
            npm_cpu: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            npm_pkg: cli-win32-x64
            npm_os: win32
            npm_cpu: x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="0.0.0-canary.${GITHUB_SHA::7}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          mkdir -p pkg/bin
          go build -ldflags="-s -w" -o "pkg/bin/nanoloop${{ matrix.ext }}" .

      - name: Create package.json
        shell: bash
        run: |
          cat > pkg/package.json << EOF
          {
            "name": "@nanoloop/${{ matrix.npm_pkg }}",
            "version": "$VERSION",
            "os": ["${{ matrix.npm_os }}"],
            "cpu": ["${{ matrix.npm_cpu }}"],
            "bin": {
              "nanoloop": "bin/nanoloop${{ matrix.ext }}"
            },
            "repository": {
              "type": "git",
              "url": "https://github.com/nanoloophq/cli"
            },
            "license": "MIT"
          }
          EOF

      - name: Publish platform package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd pkg && npm publish --tag canary --access public

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="0.0.0-canary.${GITHUB_SHA::7}"

          mkdir -p publish/bin
          cp npm/bin/nanoloop publish/bin/
          chmod +x publish/bin/nanoloop

          cat > publish/package.json << EOF
          {
            "name": "@nanoloop/cli",
            "version": "$VERSION",
            "description": "Nanoloop CLI for uploading source maps",
            "bin": {
              "nanoloop": "bin/nanoloop"
            },
            "optionalDependencies": {
              "@nanoloop/cli-darwin-arm64": "$VERSION",
              "@nanoloop/cli-darwin-x64": "$VERSION",
              "@nanoloop/cli-linux-x64": "$VERSION",
              "@nanoloop/cli-linux-arm64": "$VERSION",
              "@nanoloop/cli-win32-x64": "$VERSION"
            },
            "repository": {
              "type": "git",
              "url": "https://github.com/nanoloophq/cli"
            },
            "license": "MIT"
          }
          EOF

          cd publish && npm publish --tag canary --access public
